<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate a new password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        nav a {
            display: inline-block;
            margin: 10px 10px 20px 0;
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        nav a:hover {
            background-color: #0056b3;
        }
        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60vh;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
        }
        .form h2 {
            margin-top: 0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .options label {
            display: block;
            margin-bottom: 5px;
        }
        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .result-box {
            margin-top: 20px;
            display: flex;
            align-items: center;
        }
        .result {
            flex: 1;
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px solid #ced4da;
            border-radius: 5px;
            word-break: break-all;
        }
        .copy-btn {
            margin-left: 10px;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .copy-btn:hover {
            background-color: #0056b3;
        }
        .copy-msg {
            margin-top: 10px;
            color: green;
            display: none;
        }

        .copy-msg.show {
            display: block;
        }
        
    </style>
</head>
<body>
    
    <h1>Generate a new password</h1>

    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/add">Add New Password</a>
        <a href="/view">View All Passwords</a>
    </nav>

    <p>This page will allow you to generate a strong password based on your preferences.</p>

    <div class="main">
        <div class="container">
            <div class="form">
                <h2>Generate Password</h2>

                <div class="input-group">
                    <label>Password Length</label>
                    <input type="number" id="length" placeholder="Enter length (eg: 12)">
                </div>

                <div class="options">
                    <label><input type="checkbox" id="letters" checked> Letters</label>
                    <label><input type="checkbox" id="numbers"> Numbers</label>
                    <label><input type="checkbox" id="symbols"> Special Symbols</label>
                </div>

                <button onclick="generatePassword()">Generate Password</button>

                <div class="result-box">
                    <div class="result" id="result">Your password will appear here</div>
                    <button class="copy-btn" onclick="copyPassword()">📋</button>
                </div>

                <div class="copy-msg" id="copyMsg">Copied to clipboard!</div>
            </div>
        </div>
    </div>

    <script>

        function generatePassword() {
            const length = document.getElementById("length").value;
            const includeLetters = document.getElementById("letters").checked;
            const includeNumbers = document.getElementById("numbers").checked;
            const includeSymbols = document.getElementById("symbols").checked;

            let characters = "";
            if (includeLetters) characters += "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
            if (includeNumbers) characters += "0123456789";
            if (includeSymbols) characters += "!@#$%^&*()_+~`|}{[]:;?><,./-=";

            let password = "";
            for (let i = 0; i < length; i++) {
                password += characters.charAt(Math.floor(Math.random() * characters.length));
            }

            document.getElementById("result").textContent = password;
        }

        function copyPassword() {
            const result = document.getElementById("result").textContent;
            navigator.clipboard.writeText(result).then(() => {
                const copyMsg = document.getElementById("copyMsg");
                copyMsg.style.display = "block";
                setTimeout(() => {
                    copyMsg.style.display = "none";
                }, 2000);
            });
        }


    </script>
</body>
</html>
